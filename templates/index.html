<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BenScan AI Object Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { overscroll-behavior-y: contain; }
        .feed-layer { 
            object-fit: cover; 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            transition: opacity 0.3s ease;
        }
        .ultra-wide-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        @media (max-width: 1023px) {
            .mobile-drawer {
                transform: translateY(100%);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .mobile-drawer.open {
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="gradient-bg text-slate-800 h-screen flex flex-col overflow-hidden font-sans">

    <header class="glass-panel p-4 z-20 flex justify-between items-center border-b border-blue-100 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-xl shadow-blue-200 shadow-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
            </div>
            <h1 class="text-2xl font-black tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">BenScan</h1>
        </div>
        <div class="flex items-center gap-3">
            <div id="statusIndicator" class="h-2.5 w-2.5 bg-slate-300 rounded-full transition-all duration-500"></div>
            <button id="showDetectionsBtn" class="lg:hidden text-blue-600 font-bold text-sm px-3 py-1.5 rounded-full bg-blue-50 border border-blue-100">
                <span id="mobileCountBtn">0</span> Objects
            </button>
            <button id="fullscreenBtn" class="text-slate-400 hover:text-blue-600 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden relative">
        <div class="flex-1 relative bg-slate-200 flex justify-center items-center overflow-hidden m-2 lg:m-4 rounded-3xl shadow-inner border border-white/50">
            <video id="videoElement" class="feed-layer opacity-0" autoplay playsinline></video>
            <canvas id="overlayCanvas" class="feed-layer z-10"></canvas>
            
            <div id="placeholder" class="z-10 text-slate-400 flex flex-col items-center p-8 text-center">
                <div class="w-20 h-20 mb-4 rounded-3xl bg-white flex items-center justify-center shadow-xl border border-blue-50">
                    <svg class="w-10 h-10 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                </div>
                <h2 class="text-lg font-bold text-slate-600">Ready to Scan</h2>
                <p class="text-sm text-slate-400 mt-1">Tap start to begin identification</p>
            </div>
        </div>

        <!-- Sidebar for Desktop, Bottom Drawer for Mobile -->
        <aside id="detectionSidebar" class="mobile-drawer fixed inset-x-0 bottom-0 z-30 lg:relative lg:translate-y-0 lg:flex flex-col w-full lg:w-80 glass-panel lg:border-l border-blue-100 lg:rounded-none rounded-t-[2.5rem] shadow-2xl lg:shadow-none max-h-[70vh] lg:max-h-full">
            <div class="p-5 border-b border-blue-50 flex justify-between items-center sticky top-0 glass-panel rounded-t-[2.5rem] lg:rounded-none">
                <div class="flex items-center gap-2">
                    <h3 class="font-bold text-slate-700">Live Objects</h3>
                    <span id="detectionCount" class="bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
                <button id="closeDrawerBtn" class="lg:hidden p-2 text-slate-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
            </div>
            <div id="detectionList" class="flex-1 overflow-y-auto p-4 space-y-3 pb-10 lg:pb-4">
                <div class="text-center py-10 text-slate-400 text-sm italic">
                    Waiting for detections...
                </div>
            </div>
        </aside>
    </main>

    <footer class="glass-panel p-6 z-20 border-t border-blue-100 flex justify-center safe-area-bottom">
        <div class="flex w-full ultra-wide-container gap-4">
            <button id="startBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-200 active:scale-95 flex items-center justify-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Start Camera
            </button>
            <button id="stopBtn" class="flex-1 bg-white border-2 border-rose-100 text-rose-600 hover:bg-rose-50 font-bold py-4 rounded-2xl transition-all shadow-sm active:scale-95 hidden flex items-center justify-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H9a1 1 0 01-1-1v-4z"></path></svg>
                Stop
            </button>
            <button id="switchBtn" class="bg-blue-50 hover:bg-blue-100 text-blue-600 p-4 rounded-2xl transition-all hidden active:scale-95 border border-blue-100 shadow-sm">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>
    </footer>

    <canvas id="captureCanvas" class="hidden"></canvas>

    <script>
        const video = document.getElementById('videoElement');
        const overlay = document.getElementById('overlayCanvas');
        const captureCanvas = document.getElementById('captureCanvas');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const switchBtn = document.getElementById('switchBtn');
        const placeholder = document.getElementById('placeholder');
        const statusIndicator = document.getElementById('statusIndicator');
        const detectionList = document.getElementById('detectionList');
        const detectionCount = document.getElementById('detectionCount');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const showDetectionsBtn = document.getElementById('showDetectionsBtn');
        const closeDrawerBtn = document.getElementById('closeDrawerBtn');
        const detectionSidebar = document.getElementById('detectionSidebar');
        const mobileCountBtn = document.getElementById('mobileCountBtn');
        
        const ctxOverlay = overlay.getContext('2d');
        const ctxCapture = captureCanvas.getContext('2d');

        let stream = null;
        let isDetecting = false;
        let currentFacingMode = "environment";
        let scaleFactor = 1;

        // Toggle mobile drawer
        showDetectionsBtn.addEventListener('click', () => detectionSidebar.classList.add('open'));
        closeDrawerBtn.addEventListener('click', () => detectionSidebar.classList.remove('open'));

        async function startCamera() {
            try {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }

                const constraints = {
                    video: { 
                        facingMode: currentFacingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        advanced: [{ focusMode: "continuous" }]
                    }, 
                    audio: false 
                };

                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                video.classList.remove('hidden');
                video.style.opacity = "1";
                placeholder.classList.add('hidden');
                startBtn.classList.add('hidden');
                stopBtn.classList.remove('hidden');
                switchBtn.classList.remove('hidden');
                
                statusIndicator.classList.replace('bg-slate-300', 'bg-blue-500');
                statusIndicator.classList.add('shadow-[0_0_8px_rgba(59,130,246,0.6)]');

                video.onloadedmetadata = () => {
                    overlay.width = video.videoWidth;
                    overlay.height = video.videoHeight;
                    scaleFactor = Math.min(1.0, 640 / video.videoWidth);
                    captureCanvas.width = video.videoWidth * scaleFactor;
                    captureCanvas.height = video.videoHeight * scaleFactor;
                    if (!isDetecting) processFrame();
                };
            } catch (err) {
                console.error(err);
                alert("Could not access camera.");
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null; 
                video.style.opacity = "0";
                setTimeout(() => video.classList.add('hidden'), 300);
                placeholder.classList.remove('hidden');
                startBtn.classList.remove('hidden');
                stopBtn.classList.add('hidden');
                switchBtn.classList.add('hidden');
                statusIndicator.classList.replace('bg-blue-500', 'bg-slate-300');
                statusIndicator.classList.remove('shadow-[0_0_8px_rgba(59,130,246,0.6)]');
                ctxOverlay.clearRect(0, 0, overlay.width, overlay.height);
                updateDetectionUI([]);
            }
        }

        function switchCamera() {
            currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
            startCamera(); 
        }

        async function processFrame() {
            if (!stream) {
                isDetecting = false;
                return;
            }
            isDetecting = true;
            ctxCapture.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
            const imageData = captureCanvas.toDataURL('image/jpeg', 0.6);

            try {
                const response = await fetch('/detect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });
                if (response.ok) {
                    const data = await response.json();
                    if (stream) {
                        drawDetections(data.detections);
                        updateDetectionUI(data.detections);
                    }
                }
            } catch (error) {
                console.error(error);
            } finally {
                if (stream) setTimeout(processFrame, 60);
                else isDetecting = false;
            }
        }

        function drawDetections(detections) {
            ctxOverlay.clearRect(0, 0, overlay.width, overlay.height);
            if (!stream || !detections || detections.length === 0) return;

            detections.forEach(det => {
                const x = det.bbox[0] / scaleFactor;
                const y = det.bbox[1] / scaleFactor;
                const w = det.bbox[2] / scaleFactor;
                const h = det.bbox[3] / scaleFactor;
                
                const label = det.class.toUpperCase();
                const confidence = Math.round(det.confidence * 100);
                
                // Blue-themed palette for boxes
                const colors = ['#2563eb', '#4f46e5', '#3b82f6', '#6366f1', '#0ea5e9'];
                const color = colors[det.class.length % colors.length];

                // Draw bounding box
                ctxOverlay.strokeStyle = color; 
                ctxOverlay.lineWidth = Math.max(4, overlay.width / 150);
                ctxOverlay.lineJoin = 'round';
                ctxOverlay.strokeRect(x, y, w, h);

                // Draw label background
                const fontSize = Math.max(16, Math.floor(overlay.width / 35));
                ctxOverlay.font = `bold ${fontSize}px system-ui, sans-serif`;
                const text = `${label} ${confidence}%`;
                const textWidth = ctxOverlay.measureText(text).width;
                const labelPadding = 12;
                const labelHeight = fontSize + 12;
                
                let labelY = y - labelHeight;
                if (labelY < 0) labelY = y;
                
                ctxOverlay.fillStyle = color;
                ctxOverlay.beginPath(); // CRITICAL: Reset the path for each frame's labels
                if (ctxOverlay.roundRect) {
                    ctxOverlay.roundRect(x, labelY, textWidth + labelPadding, labelHeight, [8, 8, 0, 0]);
                } else {
                    ctxOverlay.rect(x, labelY, textWidth + labelPadding, labelHeight);
                }
                ctxOverlay.fill();

                ctxOverlay.fillStyle = '#ffffff';
                ctxOverlay.fillText(text, x + labelPadding/2, labelY + fontSize);
            });
        }

        function updateDetectionUI(detections) {
            if (!detections || detections.length === 0) {
                detectionList.innerHTML = '<div class="text-center py-10 text-slate-400 text-sm italic">Waiting for detections...</div>';
                detectionCount.textContent = '0';
                mobileCountBtn.textContent = '0';
                return;
            }

            detectionCount.textContent = detections.length;
            mobileCountBtn.textContent = detections.length;
            
            const counts = {};
            detections.forEach(d => counts[d.class] = (counts[d.class] || 0) + 1);

            detectionList.innerHTML = Object.entries(counts).map(([cls, count]) => `
                <div class="bg-white p-4 rounded-2xl border border-blue-50 flex justify-between items-center shadow-sm animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 bg-blue-500 rounded-full"></div>
                        <span class="font-bold text-slate-700 capitalize">${cls}</span>
                    </div>
                    <span class="bg-blue-600 text-white px-3 py-1 rounded-full text-xs font-black shadow-md shadow-blue-100">${count}x</span>
                </div>
            `).join('');
        }

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });

        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);
        switchBtn.addEventListener('click', switchCamera);
    </script>
</body>
</html>
