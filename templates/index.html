<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BenScan AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; height: 100vh; position: fixed; width: 100%; font-family: sans-serif; }
        #video { object-fit: cover; width: 100vw; height: 100vh; position: absolute; }
        #overlay { position: absolute; top: 0; left: 0; z-index: 10; width: 100vw; height: 100vh; pointer-events: none; }
        .ui { position: absolute; z-index: 20; inset: 0; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        button { pointer-events: auto; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    <canvas id="overlay"></canvas>

    <div class="ui">
        <header class="p-6 bg-gradient-to-b from-black/70 to-transparent">
            <h1 class="text-white text-2xl font-bold italic">BEN<span class="text-blue-500">SCAN</span></h1>
            <div id="ai-status" class="text-blue-400 text-xs font-mono mt-1 uppercase tracking-tighter">Ready to scan</div>
        </header>

        <footer class="p-8 bg-gradient-to-t from-black/80 to-transparent">
            <button id="startBtn" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-2xl active:scale-95 transition-all">ENABLE SCANNER</button>
            <div id="activeControls" class="hidden flex gap-3">
                <button id="switchBtn" class="flex-1 bg-white/10 border border-white/20 text-white py-4 rounded-xl backdrop-blur-md">SWITCH CAMERA</button>
                <button id="stopBtn" class="flex-1 bg-red-600/20 border border-red-600/50 text-red-500 py-4 rounded-xl backdrop-blur-md">STOP</button>
            </div>
        </footer>
    </div>

    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const aiStatus = document.getElementById('ai-status');
        const startBtn = document.getElementById('startBtn');
        const activeControls = document.getElementById('activeControls');
        
        let stream = null;
        let isRunning = false;
        let facingMode = "environment";

        async function start() {
            try {
                aiStatus.innerText = "ACCESSING CAMERA...";
                
                if(stream) {
                    stream.getTracks().forEach(t => t.stop());
                }

                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: facingMode, width: {ideal: 640} }, 
                    audio: false 
                });
                
                video.srcObject = stream;
                
                startBtn.classList.add('hidden');
                activeControls.classList.remove('hidden');
                aiStatus.innerText = "AI ENGINE: ACTIVE";

                video.onloadedmetadata = () => {
                    overlay.width = video.videoWidth;
                    overlay.height = video.videoHeight;
                    if (!isRunning) analyze();
                };
            } catch (e) { 
                aiStatus.innerText = "ERROR: " + e.message;
                console.error(e);
                alert("Camera Error: Please ensure you are using http://localhost:5000 or https://");
            }
        }

        async function analyze() {
            if (!stream) { isRunning = false; return; }
            isRunning = true;

            const hidden = document.getElementById('hiddenCanvas');
            const ctxH = hidden.getContext('2d');
            
            // Shrink image to 320px for the server to keep it fast
            const scale = 320 / video.videoWidth;
            hidden.width = 320;
            hidden.height = video.videoHeight * scale;
            ctxH.drawImage(video, 0, 0, hidden.width, hidden.height);
            
            try {
                const res = await fetch('/detect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: hidden.toDataURL('image/jpeg', 0.5) })
                });
                const data = await res.json();
                
                if (data.detections && data.detections.length > 0) {
                    aiStatus.innerText = `DETECTED: ${data.detections[0].class.toUpperCase()}`;
                    draw(data.detections, scale);
                } else {
                    aiStatus.innerText = "SCANNING...";
                    const ctx = overlay.getContext('2d');
                    ctx.clearRect(0, 0, overlay.width, overlay.height);
                }
            } catch (e) { 
                aiStatus.innerText = "SERVER CONNECTING..."; 
            }

            // Set interval to 700ms to prevent server overload
            setTimeout(analyze, 700);
        }

        function draw(dets, scale) {
            const ctx = overlay.getContext('2d');
            ctx.clearRect(0, 0, overlay.width, overlay.height);

            dets.forEach(d => {
                const x = d.bbox[0] / scale;
                const y = d.bbox[1] / scale;
                const w = d.bbox[2] / scale;
                const h = d.bbox[3] / scale;
                
                // Draw thin, modern bounding box
                ctx.strokeStyle = '#3b82f6'; 
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, w, h);
                
                // Draw small responsive label
                const label = `${d.class.toUpperCase()} ${Math.round(d.confidence * 100)}%`;
                ctx.font = '600 14px sans-serif';
                const textWidth = ctx.measureText(label).width;
                
                ctx.fillStyle = '#3b82f6';
                ctx.fillRect(x, (y - 20 < 0 ? y : y - 20), textWidth + 10, 20);
                
                ctx.fillStyle = '#ffffff';
                ctx.fillText(label, x + 5, (y - 20 < 0 ? y + 14 : y - 6));
            });
        }

        // --- BUTTON EVENT LISTENERS ---
        startBtn.onclick = start;
        
        document.getElementById('stopBtn').onclick = () => {
            if(stream) stream.getTracks().forEach(t => t.stop());
            location.reload();
        };

        document.getElementById('switchBtn').onclick = () => {
            facingMode = facingMode === "environment" ? "user" : "environment";
            start();
        };
    </script>
</body>
</html>
